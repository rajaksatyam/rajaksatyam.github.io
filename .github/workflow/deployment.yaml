name: KB Deployment Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: FRONTEND → GITHUB PAGES
  # Only runs when frontend files change
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    # ✅ Only trigger when frontend code actually changed
    if: |
      contains(toJson(github.event.commits.*.modified), 'frontend/') ||
      contains(toJson(github.event.commits.*.added), 'frontend/')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
        env:
          # ✅ Injected at build time — replaces hardcoded IP in client.ts
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist

  # ==========================================
  # JOB 2: BACKEND → ORACLE CLOUD
  # Only runs when backend files change
  # ==========================================
  deploy-backend:
    runs-on: ubuntu-latest
    # ✅ Only trigger when backend code actually changed
    if: |
      contains(toJson(github.event.commits.*.modified), 'backend/') ||
      contains(toJson(github.event.commits.*.added), 'backend/')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_NAMESPACE }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH into Oracle VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST_IP }}
          username: opc
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            export OCI_REGISTRY="${{ secrets.OCI_REGISTRY }}"
            export OCI_NAMESPACE="${{ secrets.OCI_NAMESPACE }}"
            export OCI_USERNAME="${{ secrets.OCI_USERNAME }}"
            export OCI_AUTH_TOKEN="${{ secrets.OCI_AUTH_TOKEN }}"
            /home/opc/deploy_backend.sh