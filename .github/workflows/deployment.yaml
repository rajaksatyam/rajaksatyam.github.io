name: KB Deployment Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write # ✅ Kept: Allows pushing to GHCR

jobs:
  # ==========================================
  # JOB 1: FRONTEND → GITHUB PAGES
  # Only runs when frontend files change
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          # ✅ Injected at build time — replaces hardcoded IP in client.ts
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist

  # ==========================================
  # JOB 2: BACKEND → GITHUB CONTAINER REGISTRY (FREE)
  # ==========================================
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1.CHANGED: Log in to GHCR instead of OCI
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2.ADDED: Convert registry path to lowercase to prevent Docker build errors
      - name: Set lowercased image tag
        run: |
          # 💡 Store the path in a local variable, then lowercase only the value
          IMAGE_PATH="ghcr.io/${{ github.repository }}/backend:latest"
          echo "GHCR_IMAGE=${IMAGE_PATH,,}" >> $GITHUB_ENV
      # 3.CHANGED: Push to the new GHCR tag environment variable
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.GHCR_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. CHANGED: Export GHCR environment variables for your server deployment script
      - name: SSH into Oracle VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            export BACKEND_IMAGE="${{ env.GHCR_IMAGE }}"
            export GHCR_USERNAME="${{ github.actor }}"
            export GHCR_PAT="${{ secrets.GHCR_PAT }}"
            /home/ubuntu/deploy_backend.sh