name: KB Deployment Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write # ✅ Kept: Allows pushing to GHCR

jobs:
  # ==========================================
  # JOB 1: FRONTEND → CLOUDFRONT
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json # ✅ Tells Node where your lockfile is

      - name: Install Dependencies & Build
        env:
          # ✅ Injected safely at build time into Vite files
          VITE_API_URL: https://kb-api.flashhub.net
        run: |
          cd frontend # ✅ Navigates into frontend directory
          npm ci
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 

      - name: Deploy Compiled Files to S3
        run: |
          aws s3 sync ./frontend/dist/ s3://kb-frontend-prod --delete # ✅ Points to the correct build output folder

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  # ==========================================
  # JOB 2: BACKEND → GITHUB CONTAINER REGISTRY (FREE)
  # ==========================================
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercased image tag
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository }}/backend:latest"
          echo "GHCR_IMAGE=${IMAGE_PATH,,}" >> $GITHUB_ENV

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.GHCR_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH into Oracle VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            export BACKEND_IMAGE="${{ env.GHCR_IMAGE }}"
            export GHCR_USERNAME="${{ github.actor }}"
            export GHCR_PAT="${{ secrets.GHCR_PAT }}"
            /home/ubuntu/deploy_backend.sh